services:
  postgres:
    image: ghcr.io/tgdrive/postgres:18
    container_name: teldrive-test-postgres
    environment:
      POSTGRES_USER: teldrive_test
      POSTGRES_PASSWORD: teldrive_test
      POSTGRES_DB: teldrive_test
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teldrive_test -d teldrive_test"]
      interval: 2s
      timeout: 2s
      retries: 30
