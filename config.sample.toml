[cache]
  max-size = 10485760

[db]
  data-source = ""
  prepare-stmt = true

  [db.pool]
    enable = true
    max-idle-connections = 25
    max-lifetime = "10m"
    max-open-connections = 25

[events]
  db-buffer-size = 1000
  db-workers = 10
  deduplication-ttl = "5s"
  poll-interval = "10s"

[jwt]
  allowed-users = []
  secret = ""
  session-time = "30d"

[log]
  file = ""
  level = "info"
  time-format = "2006-01-02 15:04:05"

  [log.db]
    ignore-record-not-found = true
    level = "error"
    log-sql = true
    slow-threshold = "1s"

  [log.http]
    enabled = true
    log-queries = false
    log-request-body-size = true
    log-response-size = true
    log-user-agent = true
    max-query-length = 100
    sanitize-queries = true
    skip-paths = ["/health", "/metrics"]

  [log.tg]
    enabled = false
    level = "warn"

[queue]
  default-workers = 50
  upload-workers = 4

[redis]
  addr = ""
  conn-max-idle-time = "5m"
  conn-max-lifetime = "1h"
  max-idle-conns = 10
  min-idle-conns = 5
  password = ""
  pool-size = 10

[server]
  enable-pprof = false
  graceful-shutdown = "10s"
  port = 8080
  read-timeout = "1h"
  write-timeout = "1h"

[tg]
  app-hash = "8da85b0d5bfe62527e5b244c209159c3"
  app-id = 2496
  app-version = "6.1.4 K"
  auto-channel-create = true
  channel-limit = 500000
  device-model = "Mozilla/5.0 (X11; Ubuntu; Linux x86_64; rv:109.0) Gecko/20100101 Firefox/116.0"
  enable-logging = false
  lang-code = "en"
  lang-pack = "webk"
  ntp = false
  pool-size = 8
  proxy = ""
  rate = 100
  rate-burst = 5
  rate-limit = true
  reconnect-timeout = "5m"
  session-instance = "teldrive"
  system-lang-code = "en-US"
  system-version = "Win32"

  [tg.mtproxy]
    addr = ""
    secret = ""

  [tg.session]
    key = "session"
    type = "postgres"

    [tg.session.bolt]
      no-grow-sync = false
      path = ""
      timeout = "1s"

  [tg.stream]
    bots-limit = 0
    buffers = 8
    chunk-timeout = "30s"
    concurrency = 1

  [tg.uploads]
    encryption-key = ""
    max-retries = 10
    retention = "7d"
    threads = 8
