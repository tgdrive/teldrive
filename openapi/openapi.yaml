        default: list
      explode: false
    FileQuery.order:
      name: order
      in: query
      required: false
      description: Sort order
      schema:
        type: string
        enum:
          - asc
          - desc
        default: asc
      explode: false
    FileQuery.page:
      name: page
      in: query
      required: false
      description: Page number
      schema:
        type: integer
        minimum: 1
        default: 1
      explode: false
    FileQuery.parentId:
      name: parentId
      in: query
      required: false
      description: Parent folder ID
      schema:
        $ref: '#/components/schemas/UUID'
      explode: false
    FileQuery.path:
      name: path
      in: query
      required: false
      description: File path
      schema:
        type: string
      explode: false
    FileQuery.query:
      name: query
      in: query
      required: false
      description: Search query
      schema:
        type: string
      explode: false
    FileQuery.searchType:
      name: searchType
      in: query
      required: false
      description: Search type
      schema:
        type: string
        enum:
          - text
          - regex
        default: text
      explode: false
    FileQuery.shared:
      name: shared
      in: query
      required: false
      description: Show shared files
      schema:
        type: boolean
      explode: false
    FileQuery.sort:
      name: sort
