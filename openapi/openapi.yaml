      schema:
        type: string
      explode: false
    JobListQuery.cursor:
      name: cursor
      in: query
      required: false
      description: Pagination cursor
      schema:
        type: string
      explode: false
    JobListQuery.limit:
      name: limit
      in: query
      required: false
      description: Maximum number of jobs to return
