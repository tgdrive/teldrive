    ShareQuery.cursor:
      name: cursor
      in: query
      required: false
      description: Pagination cursor
      schema:
        type: string
      explode: false
    ShareQuery.limit:
      name: limit
      in: query
      required: false
      description: Items per page
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 500
      explode: false
    ShareQuery.order:
      name: order
      in: query
      required: false
      description: Sort order
      schema:
        type: string
        enum:
          - asc
          - desc
        default: asc
      explode: false
    ShareQuery.page:
      name: page
      in: query
      required: false
      description: Page number
      schema:
        type: integer
        minimum: 1
        default: 1
      explode: false
    ShareQuery.path:
      name: path
      in: query
      required: false
      description: Folder path
      schema:
        type: string
      explode: false
    ShareQuery.sort:
      name: sort
      in: query
      required: false
      description: Sort field
      schema:
        type: string
        enum:
          - name
          - updatedAt
          - size
          - id
        default: name
      explode: false
    UploadQuery.channelId:
      name: channelId
      in: query
      required: false
      description: Optional channel identifier for upload
      schema:
        type: integer
        format: int64
      explode: false
    UploadQuery.encrypted:
      name: encrypted
      in: query
      required: false
      description: Whether the upload content is encrypted
      schema:
        type: boolean
