openapi: 3.0.0
info:
  title: Teldrive
  version: 0.0.0
tags:
  - name: Auth
  - name: PeriodicJobs
  - name: Files
  - name: Jobs
  - name: Uploads
  - name: Users
  - name: Shares
  - name: Events
  - name: Version
paths:
  /auth/attempts:
    post:
      operationId: Auth_createAttempt
      summary: Create auth attempt
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthAttempt'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthAttemptCreate'
  /auth/attempts/{id}:
    get:
      operationId: Auth_getAttempt
      summary: Get auth attempt
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthAttempt'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Auth
    delete:
      operationId: Auth_deleteAttempt
      summary: Delete auth attempt
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: There is no content to send for this request, but the headers may be useful.
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Auth
  /auth/attempts/{id}/password:
    post:
      operationId: Auth_password
      summary: Complete password auth
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: There is no content to send for this request, but the headers may be useful.
        default:
