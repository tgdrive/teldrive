        - AccessTokenCookieAuth: []
        - XApiKeyHeaderAuth: []
        - SessionHashAuth: []
  /events/stream:
    get:
      operationId: Events_eventsStream
      summary: Server-Sent Events stream
      description: Real-time event stream using Server-Sent Events (SSE). Events are filtered by authenticated user. Optional interval parameter for heartbeat configuration.
      parameters:
        - name: types
          in: query
          required: false
          description: 'Event types filter. Supports repeated query params and comma-separated values. Wildcards supported: files.*, uploads.*, jobs.*'
          schema:
            type: array
            items:
              type: string
          explode: false
        - name: interval
          in: query
          required: false
          description: 'Heartbeat interval in milliseconds (default: 30000)'
          schema:
            type: integer
            format: int64
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          headers:
            Cache-Control:
              required: true
              schema:
                type: string
                enum:
                  - no-cache
            Connection:
              required: true
              schema:
                type: string
                enum:
                  - keep-alive
          content:
            text/event-stream:
              x-ogen-raw-response: true
              schema:
                type: string
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Events
      security:
        - BearerAuth: []
        - AccessTokenCookieAuth: []
        - XApiKeyHeaderAuth: []
        - SessionHashAuth: []
