  /auth/login:
    post:
      x-ogen-raw-response: true
      operationId: Auth_login
      summary: Login
      parameters: []
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
          headers:
            Set-Cookie:
              required: true
              schema:
                type: string
        default:
          description: An unexpected error response.
          content:
            application/json:
