      explode: false
    FileQuery.limit:
      name: limit
      in: query
      required: false
      description: Items per page
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 500
      explode: false
    FileQuery.name:
      name: name
      in: query
      required: false
